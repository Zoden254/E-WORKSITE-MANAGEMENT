{% extends "master.html" %}
{% load widget_tweaks %}

{% block title %}New Employee{% endblock title %}

{% block content %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div>
    {% for field in form %}
    <label>{{field.label}}</label><br>
    {% render_field field class="" placeholder=field.label %}<br>
    {% endfor %}
    </div>

    <button type="submit">Register</button>
    
</form>

{% endblock content %}
